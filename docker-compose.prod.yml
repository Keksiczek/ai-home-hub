# docker-compose.prod.yml – Production deployment for AI Home Hub
# Cross-platform: Linux, Windows (Docker Desktop), macOS (Docker Desktop)
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Override env vars via .env.prod file or shell environment.
# See .env.prod.example for all available options.

services:
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "${APP_PORT:-8000}:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - SAFE_MODE=${SAFE_MODE:-true}
      - TZ=${TZ:-UTC}
      - DATA_PATH=/app/data
    volumes:
      # Relative path – works on Linux, Windows, macOS
      - ./data:/app/data
    depends_on:
      ollama:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${APP_MEMORY_LIMIT:-2g}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  ollama:
    image: ollama/ollama:latest
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: ${OLLAMA_MEMORY_LIMIT:-4g}
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot model pull – runs once, then exits
  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "ollama pull llama3.2 &&
       ollama pull qwen2.5-coder:3b &&
       ollama pull llava:7b"
    restart: "no"

  # Optional: Grafana for monitoring dashboards
  # Enable by setting ENABLE_GRAFANA=true in .env.prod
  grafana:
    image: grafana/grafana:latest
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_INSTALL_PLUGINS=
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - monitoring
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"

volumes:
  ollama_data:
    driver: local
  grafana_data:
    driver: local
