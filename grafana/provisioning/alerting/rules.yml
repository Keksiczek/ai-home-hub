apiVersion: 1

groups:
  - orgId: 1
    name: resident-critical
    folder: AI Home Hub
    interval: 1m
    rules:
      - uid: resident-success-rate-low
        title: ResidentSuccessRateLow
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "${datasource}"
            model:
              expr: rate(resident_cycles_total{status="success"}[1h])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
          - refId: B
            relativeTimeRange:
              from: 3600
              to: 0
            datasourceUid: "${datasource}"
            model:
              expr: rate(resident_cycles_total[1h])
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 0.8
                    type: lt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A / ($B > 0)
              hide: false
              intervalMs: 1000
              maxDataPoints: 43200
              refId: C
              type: math
        noDataState: NoData
        execErrState: Alerting
        for: 15m
        labels:
          severity: critical
          team: home-hub
        annotations:
          summary: "Resident success rate <80%"
          description: "{{ $value }} za hodinu – agent selhává příliš často"
        isPaused: false

      - uid: agent-memory-high
        title: AgentMemoryHigh
        condition: C
        data:
          - refId: A
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: "${datasource}"
            model:
              expr: agent_memory_usage_bytes / 1e9
              instant: true
              refId: A
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params:
                      - 4
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - C
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: $A
              hide: false
              refId: C
              type: math
        noDataState: NoData
        execErrState: Alerting
        for: 5m
        labels:
          severity: warning
          team: home-hub
        annotations:
          summary: "Agent memory usage >4GB"
          description: "Resident agent využívá {{ $value }}GB paměti"
        isPaused: false
